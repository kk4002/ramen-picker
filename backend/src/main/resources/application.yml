server:
  port: 8095

spring:
  application:
    name: ramen-picker
  datasource:
    # 개발용 인메모리 H2 (재시작 시 초기화, seed 데이터 자동 적재)
    url: jdbc:h2:mem:ramenpicker;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  h2:
    console:
      enabled: true
      path: /h2-console

# CORS 허용 오리진 패턴 (로컬 개발 + 터널/배포 도메인 허용)
# 쿠키/인증정보 미사용이라 와일드카드 패턴 허용. 운영 시 특정 도메인으로 좁힐 것.
app:
  service-name: ramen-picker
  cors:
    allowed-origins: "*"
  # 중앙 지표 허브로 배치 push (best-effort).
  # url 이 비어 있으면 push 자체를 건너뜀("없으면 말고"). 원본 로그는 각 서비스에 그대로 남음.
  metrics-hub:
    url: ""
    enabled: false
    cron: "0 */10 * * * *"   # 10분마다

logging:
  level:
    com.example.ramenpicker: DEBUG
