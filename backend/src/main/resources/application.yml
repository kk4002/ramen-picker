server:
  port: 8095

spring:
  application:
    name: ramen-picker
  datasource:
    # 개발용 인메모리 H2 (재시작 시 초기화, seed 데이터 자동 적재)
    url: jdbc:h2:mem:ramenpicker;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  h2:
    console:
      enabled: true
      path: /h2-console

# CORS 허용 오리진 (프론트 Vite 개발 서버)
app:
  cors:
    allowed-origins: "http://localhost:5173,http://localhost:3000"

logging:
  level:
    com.example.ramenpicker: DEBUG
